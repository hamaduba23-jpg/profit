<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متتبع الاستثمارات</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c9a84c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="استثماراتي">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: #8a6f2e;
    --bg: #0a0d12;
    --bg2: #0f1318;
    --bg3: #151b24;
    --bg4: #1c2533;
    --text: #e8e4d8;
    --text-dim: #8a8070;
    --green: #3ddc84;
    --red: #ff6b6b;
    --blue: #5b9cf6;
    --border: rgba(201,168,76,0.15);
    --shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘Cairo’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
overflow-x: hidden;
}

/* Background texture */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background:
radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 50%),
radial-gradient(ellipse at 80% 80%, rgba(91,156,246,0.04) 0%, transparent 50%);
pointer-events: none;
z-index: 0;
}

.container { max-width: 1300px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

/* Header */
header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 28px 0 24px;
border-bottom: 1px solid var(–border);
margin-bottom: 32px;
}

.logo {
display: flex;
align-items: center;
gap: 14px;
}

.logo-icon {
width: 48px; height: 48px;
background: linear-gradient(135deg, var(–gold), var(–gold-dim));
border-radius: 14px;
display: grid;
place-items: center;
font-size: 22px;
box-shadow: 0 4px 16px rgba(201,168,76,0.3);
}

.logo-text h1 {
font-size: 22px;
font-weight: 900;
color: var(–gold);
line-height: 1;
}

.logo-text p {
font-size: 12px;
color: var(–text-dim);
margin-top: 3px;
}

.header-date {
font-size: 13px;
color: var(–text-dim);
background: var(–bg3);
padding: 8px 16px;
border-radius: 20px;
border: 1px solid var(–border);
}

/* KPI Cards */
.kpi-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap: 16px;
margin-bottom: 32px;
}

.kpi-card {
background: var(–bg3);
border: 1px solid var(–border);
border-radius: 16px;
padding: 22px;
position: relative;
overflow: hidden;
transition: transform 0.2s, box-shadow 0.2s;
}

.kpi-card:hover {
transform: translateY(-3px);
box-shadow: 0 12px 36px rgba(0,0,0,0.5);
}

.kpi-card::before {
content: ‘’;
position: absolute;
top: 0; right: 0;
width: 80px; height: 80px;
border-radius: 50%;
opacity: 0.08;
transform: translate(20px, -20px);
}

.kpi-card.gold::before { background: var(–gold); }
.kpi-card.green::before { background: var(–green); }
.kpi-card.blue::before { background: var(–blue); }
.kpi-card.red::before { background: var(–red); }

.kpi-label {
font-size: 12px;
color: var(–text-dim);
letter-spacing: 0.5px;
margin-bottom: 10px;
display: flex;
align-items: center;
gap: 6px;
}

.kpi-value {
font-size: 26px;
font-weight: 900;
line-height: 1;
margin-bottom: 6px;
}

.kpi-card.gold .kpi-value { color: var(–gold); }
.kpi-card.green .kpi-value { color: var(–green); }
.kpi-card.blue .kpi-value { color: var(–blue); }
.kpi-card.red .kpi-value { color: var(–red); }

.kpi-sub {
font-size: 11px;
color: var(–text-dim);
}

/* Sections */
.section {
background: var(–bg3);
border: 1px solid var(–border);
border-radius: 20px;
margin-bottom: 24px;
overflow: hidden;
}

.section-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 20px 24px;
border-bottom: 1px solid var(–border);
background: var(–bg4);
}

.section-title {
font-size: 15px;
font-weight: 700;
color: var(–gold);
display: flex;
align-items: center;
gap: 8px;
}

.btn {
padding: 8px 18px;
border-radius: 10px;
border: none;
cursor: pointer;
font-family: ‘Cairo’, sans-serif;
font-size: 13px;
font-weight: 600;
transition: all 0.2s;
}

.btn-gold {
background: linear-gradient(135deg, var(–gold), var(–gold-dim));
color: #0a0d12;
}

.btn-gold:hover {
box-shadow: 0 4px 16px rgba(201,168,76,0.4);
transform: translateY(-1px);
}

.btn-ghost {
background: transparent;
color: var(–text-dim);
border: 1px solid var(–border);
}

.btn-ghost:hover { color: var(–text); border-color: rgba(201,168,76,0.4); }

/* Table */
.table-wrap { overflow-x: auto; }

table {
width: 100%;
border-collapse: collapse;
}

thead th {
padding: 14px 16px;
text-align: right;
font-size: 11px;
color: var(–text-dim);
letter-spacing: 0.5px;
font-weight: 600;
background: var(–bg2);
text-transform: uppercase;
white-space: nowrap;
}

tbody tr {
border-top: 1px solid rgba(255,255,255,0.04);
transition: background 0.15s;
}

tbody tr:hover { background: rgba(255,255,255,0.03); }

tbody td {
padding: 14px 16px;
font-size: 13.5px;
white-space: nowrap;
vertical-align: middle;
}

.name-cell {
font-weight: 700;
color: var(–text);
font-size: 14px;
}

.badge {
display: inline-block;
padding: 3px 10px;
border-radius: 20px;
font-size: 11px;
font-weight: 600;
}

.badge-4m { background: rgba(91,156,246,0.15); color: var(–blue); }
.badge-6m { background: rgba(201,168,76,0.15); color: var(–gold); }
.badge-annual { background: rgba(61,220,132,0.15); color: var(–green); }

.num { direction: ltr; display: inline-block; }
.num-gold { color: var(–gold); font-weight: 700; }
.num-green { color: var(–green); font-weight: 700; }

/* Actions */
.row-actions { display: flex; gap: 6px; }

.icon-btn {
width: 30px; height: 30px;
border-radius: 8px;
border: none;
cursor: pointer;
display: grid;
place-items: center;
font-size: 13px;
transition: all 0.15s;
}

.icon-btn.edit { background: rgba(201,168,76,0.1); color: var(–gold); }
.icon-btn.edit:hover { background: rgba(201,168,76,0.25); }
.icon-btn.del { background: rgba(255,107,107,0.1); color: var(–red); }
.icon-btn.del:hover { background: rgba(255,107,107,0.25); }

/* Bottom grid */
.bottom-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 24px;
margin-bottom: 24px;
}

@media (max-width: 768px) {
.bottom-grid { grid-template-columns: 1fr; }
.kpi-grid { grid-template-columns: 1fr 1fr; }
}

/* Chart bars */
.chart-bars {
padding: 20px 24px;
display: flex;
flex-direction: column;
gap: 14px;
}

.bar-row {
display: flex;
align-items: center;
gap: 12px;
}

.bar-label {
width: 90px;
font-size: 12px;
color: var(–text-dim);
text-align: right;
flex-shrink: 0;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
}

.bar-track {
flex: 1;
height: 8px;
background: var(–bg2);
border-radius: 4px;
overflow: hidden;
}

.bar-fill {
height: 100%;
border-radius: 4px;
background: linear-gradient(90deg, var(–gold-dim), var(–gold));
transition: width 1s cubic-bezier(0.4,0,0.2,1);
}

.bar-val {
width: 80px;
font-size: 11px;
color: var(–gold);
font-weight: 700;
text-align: left;
flex-shrink: 0;
direction: ltr;
}

/* Pie-like donut */
.donut-wrap {
padding: 24px;
display: flex;
flex-direction: column;
align-items: center;
gap: 20px;
}

.donut-svg { filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5)); }

.donut-legend {
display: flex;
flex-direction: column;
gap: 8px;
width: 100%;
}

.legend-row {
display: flex;
align-items: center;
justify-content: space-between;
font-size: 12px;
}

.legend-dot {
width: 8px; height: 8px;
border-radius: 50%;
flex-shrink: 0;
}

.legend-name {
flex: 1;
margin-right: 8px;
color: var(–text-dim);
margin-inline-start: 8px;
}

.legend-pct {
color: var(–text);
font-weight: 700;
}

/* Modal */
.modal-overlay {
position: fixed; inset: 0;
background: rgba(0,0,0,0.8);
backdrop-filter: blur(4px);
z-index: 100;
display: flex;
align-items: center;
justify-content: center;
opacity: 0;
pointer-events: none;
transition: opacity 0.25s;
}

.modal-overlay.active {
opacity: 1;
pointer-events: all;
}

.modal {
background: var(–bg3);
border: 1px solid var(–border);
border-radius: 20px;
padding: 32px;
width: 90%;
max-width: 520px;
transform: scale(0.95);
transition: transform 0.25s;
position: relative;
}

.modal-overlay.active .modal { transform: scale(1); }

.modal h2 {
font-size: 20px;
font-weight: 900;
color: var(–gold);
margin-bottom: 24px;
display: flex;
align-items: center;
gap: 10px;
}

.form-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 14px;
margin-bottom: 24px;
}

.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: span 2; }

.form-group label {
font-size: 11px;
color: var(–text-dim);
letter-spacing: 0.5px;
font-weight: 600;
}

.form-group input,
.form-group select {
background: var(–bg2);
border: 1px solid var(–border);
border-radius: 10px;
padding: 10px 14px;
color: var(–text);
font-family: ‘Cairo’, sans-serif;
font-size: 13px;
outline: none;
transition: border-color 0.2s;
direction: rtl;
}

.form-group input:focus,
.form-group select:focus {
border-color: rgba(201,168,76,0.5);
box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
}

.form-group select option { background: var(–bg3); }

.modal-actions {
display: flex;
gap: 10px;
justify-content: flex-start;
}

.close-btn {
position: absolute;
top: 16px; left: 16px;
width: 32px; height: 32px;
border-radius: 50%;
border: 1px solid var(–border);
background: transparent;
color: var(–text-dim);
cursor: pointer;
font-size: 16px;
display: grid;
place-items: center;
transition: all 0.15s;
}

.close-btn:hover { color: var(–text); border-color: rgba(255,255,255,0.3); }

/* Summary box */
.summary-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 1px;
background: var(–border);
}

.summary-item {
background: var(–bg3);
padding: 18px 20px;
}

.summary-item label {
display: block;
font-size: 11px;
color: var(–text-dim);
margin-bottom: 6px;
}

.summary-item .val {
font-size: 20px;
font-weight: 900;
direction: ltr;
display: block;
}

.empty-row td {
text-align: center;
color: var(–text-dim);
padding: 40px !important;
font-size: 13px;
}

/* Animate in */
@keyframes fadeUp {
from { opacity: 0; transform: translateY(16px); }
to { opacity: 1; transform: translateY(0); }
}

.kpi-card { animation: fadeUp 0.5s ease both; }
.kpi-card:nth-child(1) { animation-delay: 0.05s; }
.kpi-card:nth-child(2) { animation-delay: 0.1s; }
.kpi-card:nth-child(3) { animation-delay: 0.15s; }
.kpi-card:nth-child(4) { animation-delay: 0.2s; }
.kpi-card:nth-child(5) { animation-delay: 0.25s; }

.toast {
position: fixed;
bottom: 24px;
left: 50%;
transform: translateX(-50%) translateY(20px);
background: var(–bg4);
border: 1px solid var(–border);
border-radius: 12px;
padding: 12px 22px;
font-size: 13px;
color: var(–gold);
opacity: 0;
transition: all 0.3s;
z-index: 200;
white-space: nowrap;
}

.toast.show {
opacity: 1;
transform: translateX(-50%) translateY(0);
}
</style>

</head>
<body>

<div class="container">

  <!-- Header -->

  <header>
    <div class="logo">
      <div class="logo-icon">📈</div>
      <div class="logo-text">
        <h1>متتبع الاستثمارات</h1>
        <p>لوحة تحكم المحفظة الاستثمارية</p>
      </div>
    </div>
    <div class="header-date" id="headerDate"></div>
    <button id="installBtn" onclick="installApp()" style="display:none;align-items:center;gap:8px;padding:8px 16px;border-radius:20px;border:1px solid var(--gold);background:rgba(201,168,76,0.1);color:var(--gold);font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;">
      📲 تثبيت التطبيق
    </button>
  </header>

  <!-- KPIs -->

  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- Investments Table -->

  <div class="section">
    <div class="section-header">
      <div class="section-title">💼 الاستثمارات</div>
      <button class="btn btn-gold" onclick="openModal()">+ إضافة استثمار</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>اسم الاستثمار</th>
            <th>رأس المال (جنيه)</th>
            <th>النسبة السنوية</th>
            <th>النوع</th>
            <th>المدة (سنوات)</th>
            <th>ربح الدورة</th>
            <th>إجمالي الربح</th>
            <th>المبلغ النهائي</th>
            <th>الإجراءات</th>
          </tr>
        </thead>
        <tbody id="investTable"></tbody>
      </table>
    </div>
  </div>

  <!-- Charts Row -->

  <div class="bottom-grid">
    <!-- Bar Chart -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">📊 توزيع رأس المال</div>
      </div>
      <div class="chart-bars" id="capitalBars"></div>
    </div>
    <!-- Donut -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">🥧 نسب الأرباح</div>
      </div>
      <div class="donut-wrap">
        <svg class="donut-svg" width="160" height="160" viewBox="0 0 160 160" id="donutSvg"></svg>
        <div class="donut-legend" id="donutLegend"></div>
      </div>
    </div>
  </div>

  <!-- Summary -->

  <div class="section" style="margin-bottom:0">
    <div class="section-header">
      <div class="section-title">📋 الملخص الكامل</div>
    </div>
    <div class="summary-grid" id="summaryGrid"></div>
  </div>

</div>

<!-- Modal -->

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">×</button>
    <h2 id="modalTitle">➕ إضافة استثمار جديد</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>اسم الاستثمار</label>
        <input type="text" id="f_name" placeholder="مثال: ميكنه 1">
      </div>
      <div class="form-group">
        <label>رأس المال (جنيه)</label>
        <input type="number" id="f_capital" placeholder="100000">
      </div>
      <div class="form-group">
        <label>النسبة السنوية (%)</label>
        <input type="number" id="f_rate" placeholder="50">
      </div>
      <div class="form-group">
        <label>نوع الاستثمار</label>
        <select id="f_type">
          <option value="4M">كل 4 أشهر</option>
          <option value="6M">كل 6 أشهر</option>
          <option value="Annual">سنوي</option>
        </select>
      </div>
      <div class="form-group">
        <label>المدة (سنوات)</label>
        <input type="number" id="f_years" placeholder="1" value="1">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="saveInvestment()">💾 حفظ</button>
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ---- Data ----
  let investments = [
    { id: 1, name: 'ميكنه 1',        capital: 100000, rate: 50, type: '6M',     years: 1 },
    { id: 2, name: 'بنجر',            capital: 200000, rate: 70, type: 'Annual', years: 1 },
    { id: 3, name: 'ميكنه 3',        capital: 200000, rate: 54, type: '6M',     years: 1 },
    { id: 4, name: 'نخيل اسيتيل',   capital: 350000, rate: 0,  type: 'Annual', years: 0 },
    { id: 5, name: 'نخيل الشوربجي', capital: 775000, rate: 27, type: 'Annual', years: 1 },
    { id: 6, name: 'دواجن',           capital: 200000, rate: 45, type: '4M',     years: 1 },
  ];
  let editId = null;
  let nextId = 10;

  const COLORS = ['#c9a84c','#5b9cf6','#3ddc84','#ff6b6b','#b57bee','#ff9f43','#54a0ff'];

  // ---- Calculations ----
  function cyclesPerYear(type) {
    if (type === '4M') return 3;
    if (type === '6M') return 2;
    return 1;
  }

  function calc(inv) {
    const cpp = cyclesPerYear(inv.type);
    const totalCycles = cpp * inv.years;
    const profitPerCycle = inv.capital * (inv.rate / 100) / cpp;
    const totalProfit = inv.capital * (inv.rate / 100) * inv.years;
    const finalAmount = inv.capital + totalProfit;
    return { cpp, totalCycles, profitPerCycle, totalProfit, finalAmount };
  }

  // ---- Render ----
  function fmt(n) {
    if (!n && n !== 0) return '—';
    return Number(n).toLocaleString('ar-EG', { maximumFractionDigits: 0 });
  }

  function fmtAED(n) {
    return (n / 13.5).toLocaleString('ar-EG', { maximumFractionDigits: 0 });
  }

  function typeBadge(t) {
    const map = { '4M': ['badge-4m','كل 4 أشهر'], '6M': ['badge-6m','كل 6 أشهر'], 'Annual': ['badge-annual','سنوي'] };
    const [cls, label] = map[t] || ['badge-4m', t];
    return `<span class="badge ${cls}">${label}</span>`;
  }

  function render() {
    renderKPIs();
    renderTable();
    renderBars();
    renderDonut();
    renderSummary();
  }

  function renderKPIs() {
    const totalCap = investments.reduce((s, i) => s + i.capital, 0);
    const totalProfit = investments.reduce((s, i) => s + calc(i).totalProfit, 0);
    const totalFinal = investments.reduce((s, i) => s + calc(i).finalAmount, 0);
    const avgRate = investments.length ? (investments.reduce((s,i)=>s+i.rate,0)/investments.length).toFixed(1) : 0;
    const monthlyProfit = totalProfit / 12;

    const kpis = [
      { label: '💰 إجمالي رأس المال', value: fmt(totalCap) + ' ج', sub: fmtAED(totalCap) + ' درهم', cls: 'gold' },
      { label: '📈 إجمالي الأرباح', value: fmt(totalProfit) + ' ج', sub: 'طوال فترة الاستثمار', cls: 'green' },
      { label: '🏁 المبلغ النهائي', value: fmt(totalFinal) + ' ج', sub: fmtAED(totalFinal) + ' درهم', cls: 'blue' },
      { label: '📅 ربح شهري', value: fmt(monthlyProfit) + ' ج', sub: fmtAED(monthlyProfit) + ' درهم', cls: 'gold' },
      { label: '⚡ متوسط العائد', value: avgRate + '%', sub: investments.length + ' استثمارات نشطة', cls: 'green' },
    ];

    document.getElementById('kpiGrid').innerHTML = kpis.map(k => `
      <div class="kpi-card ${k.cls}">
        <div class="kpi-label">${k.label}</div>
        <div class="kpi-value"><span class="num">${k.value}</span></div>
        <div class="kpi-sub">${k.sub}</div>
      </div>
    `).join('');
  }

  function renderTable() {
    const tbody = document.getElementById('investTable');
    if (!investments.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="9">لا توجد استثمارات بعد. أضف استثمارك الأول!</td></tr>';
      return;
    }
    tbody.innerHTML = investments.map(inv => {
      const c = calc(inv);
      return `
        <tr>
          <td class="name-cell">${inv.name}</td>
          <td><span class="num">${fmt(inv.capital)}</span></td>
          <td><span class="num-gold num">${inv.rate}%</span></td>
          <td>${typeBadge(inv.type)}</td>
          <td>${inv.years} سنة</td>
          <td><span class="num">${fmt(c.profitPerCycle)}</span></td>
          <td><span class="num-green num">${fmt(c.totalProfit)}</span></td>
          <td><span class="num-gold num">${fmt(c.finalAmount)}</span></td>
          <td>
            <div class="row-actions">
              <button class="icon-btn edit" onclick="openEdit(${inv.id})" title="تعديل">✏️</button>
              <button class="icon-btn del" onclick="deleteInv(${inv.id})" title="حذف">🗑️</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }

  function renderBars() {
    const maxCap = Math.max(...investments.map(i => i.capital), 1);
    document.getElementById('capitalBars').innerHTML = investments.map(inv => `
      <div class="bar-row">
        <div class="bar-label">${inv.name}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${(inv.capital/maxCap*100).toFixed(1)}%"></div>
        </div>
        <div class="bar-val">${fmt(inv.capital)}</div>
      </div>
    `).join('') || '<p style="padding:20px;color:var(--text-dim);font-size:13px">لا توجد بيانات</p>';
  }

  function renderDonut() {
    const data = investments.map((inv, i) => ({
      name: inv.name,
      val: calc(inv).totalProfit,
      color: COLORS[i % COLORS.length]
    })).filter(d => d.val > 0);

    const total = data.reduce((s, d) => s + d.val, 0) || 1;
    const cx = 80, cy = 80, r = 60, ri = 38;
    let angle = -Math.PI / 2;

    const paths = data.map(d => {
      const frac = d.val / total;
      const sweep = frac * 2 * Math.PI;
      const x1 = cx + r * Math.cos(angle);
      const y1 = cy + r * Math.sin(angle);
      angle += sweep;
      const x2 = cx + r * Math.cos(angle);
      const y2 = cy + r * Math.sin(angle);
      const ix1 = cx + ri * Math.cos(angle - sweep);
      const iy1 = cy + ri * Math.sin(angle - sweep);
      const ix2 = cx + ri * Math.cos(angle);
      const iy2 = cy + ri * Math.sin(angle);
      const large = sweep > Math.PI ? 1 : 0;
      return `<path d="M${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${ix2},${iy2} A${ri},${ri} 0 ${large},0 ${ix1},${iy1} Z" fill="${d.color}" opacity="0.9"/>`;
    });

    if (!data.length) {
      document.getElementById('donutSvg').innerHTML = `<circle cx="80" cy="80" r="60" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="22"/>
        <text x="80" y="86" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="12" font-family="Cairo">لا توجد أرباح</text>`;
      document.getElementById('donutLegend').innerHTML = '';
      return;
    }

    document.getElementById('donutSvg').innerHTML = paths.join('') +
      `<circle cx="80" cy="80" r="${ri-2}" fill="var(--bg3)"/>
       <text x="80" y="76" text-anchor="middle" fill="var(--gold)" font-size="13" font-weight="700" font-family="Cairo">${fmt(total)}</text>
       <text x="80" y="92" text-anchor="middle" fill="var(--text-dim)" font-size="9" font-family="Cairo">إجمالي الربح</text>`;

    document.getElementById('donutLegend').innerHTML = data.map(d => `
      <div class="legend-row">
        <div class="legend-dot" style="background:${d.color}"></div>
        <div class="legend-name">${d.name}</div>
        <div class="legend-pct">${(d.val/total*100).toFixed(0)}%</div>
      </div>
    `).join('');
  }

  function renderSummary() {
    const totalCap = investments.reduce((s, i) => s + i.capital, 0);
    const totalProfit = investments.reduce((s, i) => s + calc(i).totalProfit, 0);
    const totalFinal = totalCap + totalProfit;
    const items = [
      { label: 'إجمالي رأس المال', val: fmt(totalCap) + ' ج', color: 'var(--gold)' },
      { label: 'إجمالي الأرباح', val: fmt(totalProfit) + ' ج', color: 'var(--green)' },
      { label: 'المبلغ النهائي الإجمالي', val: fmt(totalFinal) + ' ج', color: 'var(--blue)' },
      { label: 'الأرباح بالدرهم الإماراتي', val: fmtAED(totalProfit) + ' د.إ', color: 'var(--gold)' },
      { label: 'ربح شهري متوسط', val: fmt(totalProfit/12) + ' ج', color: 'var(--green)' },
      { label: 'ربح شهري بالدرهم', val: fmtAED(totalProfit/12) + ' د.إ', color: 'var(--blue)' },
    ];
    document.getElementById('summaryGrid').innerHTML = items.map(item => `
      <div class="summary-item">
        <label>${item.label}</label>
        <span class="val num" style="color:${item.color}">${item.val}</span>
      </div>
    `).join('');
  }

  // ---- Modal ----
  function openModal() {
    editId = null;
    document.getElementById('modalTitle').textContent = '➕ إضافة استثمار جديد';
    document.getElementById('f_name').value = '';
    document.getElementById('f_capital').value = '';
    document.getElementById('f_rate').value = '';
    document.getElementById('f_type').value = '4M';
    document.getElementById('f_years').value = '1';
    document.getElementById('modalOverlay').classList.add('active');
    setTimeout(() => document.getElementById('f_name').focus(), 100);
  }

  function openEdit(id) {
    editId = id;
    const inv = investments.find(i => i.id === id);
    if (!inv) return;
    document.getElementById('modalTitle').textContent = '✏️ تعديل الاستثمار';
    document.getElementById('f_name').value = inv.name;
    document.getElementById('f_capital').value = inv.capital;
    document.getElementById('f_rate').value = inv.rate;
    document.getElementById('f_type').value = inv.type;
    document.getElementById('f_years').value = inv.years;
    document.getElementById('modalOverlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
  }

  function saveInvestment() {
    const name = document.getElementById('f_name').value.trim();
    const capital = parseFloat(document.getElementById('f_capital').value);
    const rate = parseFloat(document.getElementById('f_rate').value);
    const type = document.getElementById('f_type').value;
    const years = parseFloat(document.getElementById('f_years').value);

    if (!name || isNaN(capital) || isNaN(rate)) {
      showToast('⚠️ يرجى ملء جميع الحقول المطلوبة');
      return;
    }

    if (editId !== null) {
      const idx = investments.findIndex(i => i.id === editId);
      if (idx !== -1) investments[idx] = { ...investments[idx], name, capital, rate, type, years };
      showToast('✅ تم تحديث الاستثمار بنجاح');
    } else {
      investments.push({ id: nextId++, name, capital, rate, type, years });
      showToast('✅ تم إضافة الاستثمار بنجاح');
    }

    closeModal();
    render();
  }

  function deleteInv(id) {
    if (!confirm('هل أنت متأكد من حذف هذا الاستثمار؟')) return;
    investments = investments.filter(i => i.id !== id);
    render();
    showToast('🗑️ تم حذف الاستثمار');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // Date
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('ar-EG', {
    year:'numeric', month:'long', day:'numeric'
  });

  // Close modal on overlay click
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  function installApp() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
    }
  }

  // Initial render
  render();

  // Register Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(() => {
      console.log('SW registered');
    });
  }

  // PWA Install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('installBtn');
    if (btn) btn.style.display = 'flex';
  });

  window.addEventListener('appinstalled', () => {
    const btn = document.getElementById('installBtn');
    if (btn) btn.style.display = 'none';
    showToast('✅ تم تثبيت التطبيق بنجاح!');
  });
</script>

</body>
</html>
